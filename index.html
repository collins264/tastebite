<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TasteBite Kitchen - Lagos Food Delivery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-orange-600 text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">TasteBite Kitchen</h1>
      <button onclick="toggleCart()" class="relative bg-white text-orange-600 px-4 py-2 rounded-full font-semibold">
        Cart <span id="cartCount" class="bg-red-500 text-white text-xs rounded-full px-2 ml-1">0</span>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="bg-orange-500 text-white py-16 text-center">
    <h2 class="text-4xl font-bold mb-4">Hot Meals Delivered in Lagos</h2>
    <p class="text-lg">Nigerian Food, Shawarma, Burgers & More</p>
    <p class="mt-2">Order on WhatsApp: 08139320756</p>
  </section>

  <!-- Menu Grid -->
  <section class="max-w-6xl mx-auto px-4 py-12">
    <h3 class="text-3xl font-bold text-center mb-8">Our Menu</h3>
    <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
  </section>

  <!-- Cart Sidebar -->
  <div id="cartSidebar" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform z-50 p-6">
    <div class="flex justify-between mb-4">
      <h3 class="text-xl font-bold">Your Order</h3>
      <button onclick="toggleCart()">✕</button>
    </div>
    <div id="cartItems" class="mb-4"></div>
    <button onclick="checkoutWhatsApp()" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold hover:bg-green-600">Order on WhatsApp</button>
  </div>

  <!-- Footer with Copyright -->
  <footer class="bg-black text-white py-8 mt-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h3 class="text-2xl font-bold mb-2">TasteBite Kitchen</h3>
      <p class="mb-4">Food Delivery in Lagos, Nigeria</p>
      <p class="mb-2">WhatsApp: <a href="https://wa.me/2348139320756" class="underline hover:text-orange-400">08139320756</a></p>
      <p class="mb-4">Facebook: <a href="https://facebook.com/Collins Onyedikachi" class="underline hover:text-orange-400">Collins Onyedikachi</a></p>
      <p class="text-gray-300 text-sm font-semibold">© 2026 TasteBite Kitchen. Collins</p>
    </div>
  </footer>

<script>
const products = [
  {name: "TasteBite Jollof", price: 3500, img: "TasteBite.jpg"},
  {name: "TasteBite Fried Rice", price: 3500, img: "Fried rice.jpg"},
  {name: "TasteBite Pepper Soup", price: 4000, img: "pepper soup.jpg"},
  {name: "TasteBite Egusi", price: 4500, img: "Egusi.jpg"},
  {name: "TasteBite Shawarma", price: 2500, img: "Shawarma.jpg"},
  {name: "TasteBite Burger", price: 3000, img: "Burger.jpg"}
];

let cart = [];

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  products.forEach(p => {
    grid.innerHTML += `
      <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
        <img src="${p.img}" class="w-full h-48 object-cover">
        <div class="p-4">
          <h4 class="font-bold text-lg">${p.name}</h4>
          <p class="text-orange-600 font-bold">₦${p.price.toLocaleString()}</p>
          <button onclick="addToCart('${p.name}', ${p.price})" class="mt-2 w-full bg-orange-600 text-white py-2 rounded-lg hover:bg-orange-700">Add to Cart</button>
        </div>
      </div>
    `;
  });
}

function addToCart(name, price) {
  cart.push({name, price});
  document.getElementById('cartCount').innerText = cart.length;
  renderCart();
  alert(`${name} added to cart!`);
}

function renderCart() {
  const cartDiv = document.getElementById('cartItems');
  cartDiv.innerHTML = '';
  let total = 0;
  cart.forEach((item, i) => {
    total += item.price;
    cartDiv.innerHTML += `<p class="flex justify-between mb-1">${item.name} - ₦${item.price.toLocaleString()} <button onclick="removeItem(${i})" class="text-red-500">x</button></p>`;
  });
  cartDiv.innerHTML += `<hr class="my-2"><p class="font-bold">Total: ₦${total.toLocaleString()}</p>`;
}

function removeItem(i) {
  cart.splice(i,1);
  document.getElementById('cartCount').innerText = cart.length;
  renderCart();
}

function toggleCart() {
  document.getElementById('cartSidebar').classList.toggle('translate-x-full');
}

function checkoutWhatsApp() {
  if(cart.length === 0) return alert('Cart is empty');
  let msg = "Hello TasteBite Kitchen! I want to order:%0A";
  cart.forEach(item => msg += `• ${item.name} - ₦${item.price.toLocaleString()}%0A`);
  let total = cart.reduce((a,b)=>a+b.price,0);
  msg += `%0ATotal: ₦${total.toLocaleString()}`;
  window.open(`https://wa.me/2348139320756?text=${msg}`, '_blank');
  cart = [];
  document.getElementById('cartCount').innerText = 0;
  renderCart();
  toggleCart();
}

renderMenu();
</script>

</body>
</html>
